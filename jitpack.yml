jdk:
  - openjdk21

before_install:
  - git submodule update --init --recursive
  - sed -i '/include(":composeApp")/d' settings.gradle.kts
  - sed -i '/include(":shared")/d' settings.gradle.kts
  - sed -i '/foojay-resolver/d' settings.gradle.kts
  - sed -i '/compose.multiplatform/d' build.gradle.kts
  - sed -i '/compose.compiler/d' build.gradle.kts
  - sed -i '/compose-compiler/d' settings.gradle.kts
  - sed -i '/compose/d' settings.gradle.kts

install:
  - RELEASE_VERSION=${VERSION} ./gradlew :library:assembleRelease :library:publishAndroidReleasePublicationToMavenLocal --no-configuration-cache
